name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        env:
          # SC1091/SC2154: per-tunnel vars come from a sourced /etc config we cannot follow.
          SHELLCHECK_OPTS: -e SC1091 -e SC2154

  lint:
    name: Unit & config sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: systemd unit sanity
        run: |
          unit=systemd/golden-gre@.service
          grep -q '^\[Unit\]'    "$unit"
          grep -q '^\[Service\]' "$unit"
          grep -q '^\[Install\]' "$unit"
          grep -q 'ExecStart='   "$unit"
          grep -q 'ExecStop='    "$unit"
          echo "systemd unit ok"
      - name: scripts are executable & have bash shebang
        run: |
          for s in scripts/*.sh install.sh; do
            head -1 "$s" | grep -q '^#!/usr/bin/env bash' || { echo "bad shebang: $s"; exit 1; }
          done
          echo "shebangs ok"
      - name: example configs define required keys
        run: |
          for k in DEV LOCAL_PUB REMOTE_PUB TUN_ADDR FOU_PORT; do
            grep -q "$k" examples/point-to-point.conf.example || { echo "example missing $k"; exit 1; }
          done
          echo "examples ok"

# Golden GRE — loss-tolerant, forwarding-ready kernel tuning.
# Installed to /etc/sysctl.d/99-golden-gre.conf ; applied with `sysctl --system`.

# Loss-tolerant congestion control: BBR paces to the bottleneck and does not
# treat non-congestive packet loss as a signal to collapse the window (CUBIC does).
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# Large send/receive windows to fill high bandwidth-delay-product (long-haul) links.
net.ipv4.tcp_rmem = 4096 1048576 134217728
net.ipv4.tcp_wmem = 4096 1048576 134217728

# Recover gracefully if the real path MTU is below expectations.
net.ipv4.tcp_mtu_probing = 1

# Route traffic through the tunnel.
net.ipv4.ip_forward = 1
net.ipv6.conf.all.forwarding = 1
